<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HLS Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; overflow: hidden; }
video { width: 100%; height: 100%; object-fit: contain; }
#ui { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 10; }
#ui > * { pointer-events: auto; }
#url-bar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 800px; display: none; background: rgba(0,0,0,.85); padding: 12px; border-radius: 8px; gap: 8px; }
#url-bar input { flex: 1; padding: 8px 12px; font-size: 13px; border: none; border-radius: 4px; background: #222; color: #fff; outline: none; width: 100%; margin-bottom: 8px; }
#url-bar .row { display: flex; gap: 6px; }
#url-bar button { padding: 8px 16px; font-size: 13px; cursor: pointer; border: none; border-radius: 4px; background: #e00; color: #fff; white-space: nowrap; }
#url-bar button:hover { background: #c00; }
#url-bar button.sec { background: #444; }
#url-bar button.sec:hover { background: #666; }
#status { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,.4); font-size: 12px; }
#toggle-btn { position: absolute; top: 20px; right: 20px; width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,.5); color: #fff; border: 1px solid rgba(255,255,255,.2); cursor: pointer; font-size: 18px; line-height: 36px; text-align: center; }
#toggle-btn:hover { background: rgba(0,0,0,.8); }
</style>
</head>
<body>

<video id="video" controls autoplay></video>

<div id="ui">
  <div id="url-bar">
    <input id="url-input" placeholder="粘贴 m3u8 地址后回车...">
    <div class="row">
      <button id="load-btn">加载</button>
      <button id="copy-btn" class="sec">复制地址</button>
      <button id="reload-btn" class="sec">刷新</button>
    </div>
  </div>
  <button id="toggle-btn">⚙</button>
  <div id="status"></div>
</div>

<script>
const v = document.getElementById('video');
const inp = document.getElementById('url-input');
const status = document.getElementById('status');
let currentUrl = '';

function load(url) {
  url = url.trim();
  if (!url) return;
  currentUrl = url;
  inp.value = url;
  status.textContent = '加载中...';
  
  if (v.canPlayType('application/vnd.apple.mpegurl')) {
    v.src = url;
    v.onerror = () => status.textContent = '播放失败';
    v.onloadedmetadata = () => status.textContent = '已加载';
  } else if (Hls.isSupported()) {
    if (window._hls) window._hls.destroy();
    const hls = new Hls({ enableWorker: false });
    window._hls = hls;
    hls.loadSource(url);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED, () => status.textContent = '已加载 - ' + (url.split('/').pop().split('?')[0]));
    hls.on(Hls.Events.ERROR, (e, d) => { if (d.fatal) status.textContent = '错误: ' + d.type; });
  } else {
    status.textContent = '浏览器不支持 HLS';
  }
}

document.getElementById('load-btn').onclick = () => load(inp.value);
document.getElementById('copy-btn').onclick = () => {
  navigator.clipboard.writeText(inp.value).then(() => status.textContent = '已复制').catch(() => status.textContent = '复制失败');
};
document.getElementById('reload-btn').onclick = () => { if (currentUrl) load(currentUrl); };
document.getElementById('toggle-btn').onclick = () => {
  const bar = document.getElementById('url-bar');
  bar.style.display = bar.style.display === 'block' ? 'none' : 'block';
  if (bar.style.display === 'block' && currentUrl) inp.value = currentUrl;
};
inp.onkeydown = (e) => { if (e.key === 'Enter') load(inp.value); };

// Read from URL hash
const hash = location.hash.slice(1);
if (hash) try { load(decodeURIComponent(hash)); location.hash = ''; } catch(e) {}
</script>
</body>
</html>
